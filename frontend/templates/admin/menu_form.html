{% extends "admin/base_admin.html" %}

{% block title %}{% if item %}Edit{% else %}Add{% endif %} Menu Item{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">{% if item %}Edit{% else %}Add New{% endif %} Menu Item</h5>
    </div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-control" name="name" value="{{ item.name if item else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Category *</label>
                    <select class="form-control" name="category_id" required>
                        <option value="">Select Category</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if item and item.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="3">{{ item.description if item else '' }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Price *</label>
                    <input type="number" step="0.01" class="form-control" name="price" value="{{ item.price if item else '' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Display Order</label>
                    <input type="number" class="form-control" name="display_order" value="{{ item.display_order if item else '0' }}">
                </div>
            </div>
            
            {% if item and item.image_url %}
            <div class="mb-3">
                <label class="form-label">Current Image</label><br>
                <img src="{{ item.image_url }}" class="img-fluid rounded-4 mb-2" style="max-height: 100px;">
            </div>
            {% endif %}
            
            <div class="mb-3">
                <label class="form-label">Upload Image</label>
                <input type="file" class="form-control" name="image" accept="image/*">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Or Image URL</label>
                <input type="url" class="form-control" name="image_url" value="{{ item.image_url if item else '' }}" placeholder="https://...">
            </div>
            
            <div class="mb-3">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="is_special" id="isSpecial" {% if item and item.is_special %}checked{% endif %}>
                    <label class="form-check-label" for="isSpecial">Special Item</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="is_popular" id="isPopular" {% if item and item.is_popular %}checked{% endif %}>
                    <label class="form-check-label" for="isPopular">Popular Item</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if not item or item.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="isActive">Active</label>
                </div>
            </div>
            
            <hr>
            
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin_menu') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">{% if item %}Update{% else %}Create{% endif %} Item</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
