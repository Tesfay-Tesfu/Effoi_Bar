{% extends "admin/base_admin.html" %}

{% block title %}Edit Blog Post - EFFOI Admin{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Edit Blog Post</h5>
    </div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Title *</label>
                <input type="text" class="form-control" name="title" value="{{ post.title }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Content *</label>
                <textarea class="form-control" name="content" rows="10" required>{{ post.content }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Author Name *</label>
                    <input type="text" class="form-control" name="author_name" value="{{ post.author_name }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Author Email</label>
                    <input type="email" class="form-control" name="author_email" value="{{ post.author_email }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Current Image</label><br>
                {% if post.image_url %}
                <img src="{{ post.image_url }}" class="img-fluid rounded-4 mb-2" style="max-height: 200px;">
                {% else %}
                <p class="text-muted">No image uploaded</p>
                {% endif %}
            </div>
            
            <div class="mb-3">
                <label class="form-label">Upload New Image</label>
                <input type="file" class="form-control" name="image" accept="image/*">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Or Image URL</label>
                <input type="url" class="form-control" name="image_url" value="{{ post.image_url }}" placeholder="https://...">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-control" name="status">
                    <option value="pending" {% if post.status == 'pending' %}selected{% endif %}>⏳ Pending</option>
                    <option value="approved" {% if post.status == 'approved' %}selected{% endif %}>✅ Approved</option>
                    <option value="rejected" {% if post.status == 'rejected' %}selected{% endif %}>❌ Rejected</option>
                </select>
                <small class="text-muted">Select "Approved" to publish this post on the blog</small>
            </div>
            
            <hr>
            
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin_blog') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Update Post</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
