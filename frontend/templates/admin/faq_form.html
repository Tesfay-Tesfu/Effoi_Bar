{% extends "admin/base_admin.html" %}

{% block title %}{% if faq %}Edit{% else %}Add{% endif %} FAQ - EFFOI Admin{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">{% if faq %}Edit{% else %}Add New{% endif %} FAQ</h5>
    </div>
    <div class="card-body">
        <form method="POST" {% if faq %}action="{{ url_for('admin_edit_faq', faq_id=faq.id) }}"{% else %}action="{{ url_for('admin_add_faq') }}"{% endif %}>
            <div class="mb-3">
                <label class="form-label">Question</label>
                <input type="text" class="form-control" name="question" value="{{ faq.question if faq else '' }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Answer</label>
                <textarea class="form-control" name="answer" rows="5" required>{{ faq.answer if faq else '' }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Display Order</label>
                    <input type="number" class="form-control" name="display_order" value="{{ faq.display_order if faq else '0' }}">
                </div>
                
                <div class="col-md-6 mb-3">
                    <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if not faq or faq.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="isActive">Active</label>
                    </div>
                </div>
            </div>
            
            <hr>
            
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin_faqs') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
