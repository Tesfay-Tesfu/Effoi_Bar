{% extends "admin/base_admin.html" %}

{% block title %}{% if category %}Edit{% else %}Add{% endif %} Category - EFFOI Admin{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">{% if category %}Edit{% else %}Add New{% endif %} Category</h5>
    </div>
    <div class="card-body">
        <form method="POST" {% if category %}action="{{ url_for('admin_edit_category', category_id=category.id) }}"{% else %}action="{{ url_for('admin_add_category') }}"{% endif %}>
            <div class="mb-3">
                <label class="form-label">Category Name</label>
                <input type="text" class="form-control" name="name" value="{{ category.name if category else '' }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Display Order</label>
                <input type="number" class="form-control" name="display_order" value="{{ category.display_order if category else '0' }}">
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if not category or category.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="isActive">Active</label>
                </div>
            </div>
            
            <hr>
            
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin_categories') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
